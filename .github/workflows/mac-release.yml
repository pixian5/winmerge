name: Mac Release

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Determine next macOS version
        id: version
        run: |
          set -euo pipefail

          # Generate timestamp-based version: YYMMDDHHMI (e.g., 2603180101)
          version="$(date -u '+%y%m%d%H%M')"
          git fetch --force --tags

          # Ensure each code change can publish even if two runs start in the same minute.
          # Keep required version format YYMMDDHHMI by moving forward minute-by-minute until unused.
          attempts=0
          while git rev-parse "v${version}" >/dev/null 2>&1; do
            attempts=$((attempts + 1))
            if [ "${attempts}" -gt 60 ]; then
              echo "Could not resolve unique release tag after 60 attempts from base ${version}." >&2
              exit 1
            fi
            version="$(TZ=UTC date -j -v+1M -f '%y%m%d%H%M' "${version}" '+%y%m%d%H%M')"
          done

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          echo "Resolved macOS release version: ${version}"

      - name: Build macOS release artifact
        env:
          MAC_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ./mac/build-mac.sh --version "${MAC_VERSION}"

      - name: Upload build artifact to workflow run
        uses: actions/upload-artifact@v4.6.0
        with:
          name: WinMerge-macOS-${{ steps.version.outputs.version }}.zip
          path: mac/dist/WinMerge-macOS-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WinMerge macOS ${{ steps.version.outputs.version }}
          body: |
            Automated macOS build for commit ${{ github.sha }}.
          files: mac/dist/WinMerge-macOS-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
