name: Mac Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Determine next macOS version
        id: version
        run: |
          set -euo pipefail

          # Generate timestamp-based version: YYMMDDHHMI (e.g., 2603180101)
          version="$(date -u '+%y%m%d%H%M')"
          tag="v${version}"

          git fetch --force --tags

          # Check if this exact version tag already exists
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "release_exists=true" >> "${GITHUB_OUTPUT}"
            echo "version=${version}" >> "${GITHUB_OUTPUT}"
            echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
            echo "Version ${tag} already exists; skipping build."
            exit 0
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "release_exists=false" >> "${GITHUB_OUTPUT}"
          echo "Resolved macOS release version: ${version}"

      - name: Build macOS release artifact
        if: steps.version.outputs.release_exists != 'true'
        env:
          MAC_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          ./mac/build-mac.sh --version "${MAC_VERSION}"

      - name: Upload build artifact to workflow run
        if: steps.version.outputs.release_exists != 'true'
        uses: actions/upload-artifact@v4.6.0
        with:
          name: WinMerge-macOS-${{ steps.version.outputs.version }}.zip
          path: mac/dist/WinMerge-macOS-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub release
        if: steps.version.outputs.release_exists != 'true'
        uses: softprops/action-gh-release@v2.0.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WinMerge macOS ${{ steps.version.outputs.version }}
          body: |
            Automated macOS build for commit ${{ github.sha }}.
          files: mac/dist/WinMerge-macOS-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
